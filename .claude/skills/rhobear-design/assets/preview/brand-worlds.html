<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>World backgrounds</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:240px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:10px;">Three reskins · same crew, different lighting · lifelike scale anchor</div>
<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;">
  <div style="position:relative; aspect-ratio:1.4; border-radius:12px; overflow:hidden; box-shadow:var(--shadow-card); background:#000;"><img class="pixelated" src="../assets/bg-ship.png" alt="" style="width:100%; height:100%; object-fit:cover;"><img class="pixelated" src="../assets/wizard_ship.png" alt="" style="position:absolute; right:8%; bottom:6%; height:55%; filter:drop-shadow(0 4px 3px rgba(0,0,0,0.55));"><div style="position:absolute; left:8px; bottom:8px; display:flex; flex-direction:column; gap:2px;"><span style="font-family:var(--font-display); font-size:10px; letter-spacing:0.08em; color:#fff; background:rgba(0,0,0,0.55); padding:3px 8px; border-radius:4px;">SPACE</span><span style="font-family:var(--font-mono); font-size:9px; color:#fff; opacity:0.85;">Starship 17-B</span></div></div><div style="position:relative; aspect-ratio:1.4; border-radius:12px; overflow:hidden; box-shadow:var(--shadow-card); background:#000;"><img class="pixelated" src="../assets/bg-western.png" alt="" style="width:100%; height:100%; object-fit:cover;"><img class="pixelated" src="../assets/wizard_western.png" alt="" style="position:absolute; right:8%; bottom:6%; height:55%; filter:drop-shadow(0 4px 3px rgba(0,0,0,0.55));"><div style="position:absolute; left:8px; bottom:8px; display:flex; flex-direction:column; gap:2px;"><span style="font-family:var(--font-display); font-size:10px; letter-spacing:0.08em; color:#fff; background:rgba(0,0,0,0.55); padding:3px 8px; border-radius:4px;">WEST</span><span style="font-family:var(--font-mono); font-size:9px; color:#fff; opacity:0.85;">Frontier outpost</span></div></div><div style="position:relative; aspect-ratio:1.4; border-radius:12px; overflow:hidden; box-shadow:var(--shadow-card); background:#000;"><img class="pixelated" src="../assets/bg-neon.png" alt="" style="width:100%; height:100%; object-fit:cover;"><img class="pixelated" src="../assets/wizard_neon.png" alt="" style="position:absolute; right:8%; bottom:6%; height:55%; filter:drop-shadow(0 4px 3px rgba(0,0,0,0.55));"><div style="position:absolute; left:8px; bottom:8px; display:flex; flex-direction:column; gap:2px;"><span style="font-family:var(--font-display); font-size:10px; letter-spacing:0.08em; color:#fff; background:rgba(0,0,0,0.55); padding:3px 8px; border-radius:4px;">NEON</span><span style="font-family:var(--font-mono); font-size:9px; color:#fff; opacity:0.85;">Neon Tokyo · 03:14</span></div></div>
</div></body></html>
