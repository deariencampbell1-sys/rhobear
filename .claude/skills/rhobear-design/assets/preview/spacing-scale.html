<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:160px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:10px;">4-pt grid · --s-1 → --s-32</div>
<div class="row" style="align-items:flex-end; gap:14px;">
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:4px; height:4px; background:var(--c-amber); border-radius:3px;"></div><span class="tok">4</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:8px; height:8px; background:var(--c-amber); border-radius:3px;"></div><span class="tok">8</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:12px; height:12px; background:var(--c-amber); border-radius:3px;"></div><span class="tok">12</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:16px; height:16px; background:var(--c-amber); border-radius:3px;"></div><span class="tok">16</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:20px; height:20px; background:var(--c-amber); border-radius:3px;"></div><span class="tok">20</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:24px; height:24px; background:var(--c-amber); border-radius:3px;"></div><span class="tok">24</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:32px; height:32px; background:var(--c-amber); border-radius:3px;"></div><span class="tok">32</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:40px; height:40px; background:var(--c-amber); border-radius:3px;"></div><span class="tok">40</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:48px; height:48px; background:var(--c-amber); border-radius:3px;"></div><span class="tok">48</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:64px; height:64px; background:var(--c-amber); border-radius:3px;"></div><span class="tok">64</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:96px; height:96px; background:var(--c-amber); border-radius:3px;"></div><span class="tok">96</span></div>
</div>
<div class="tok" style="margin-top:14px;">--s-1 4 · --s-2 8 · --s-3 12 · --s-4 16 · --s-5 20 · --s-6 24 · --s-8 32 · --s-10 40 · --s-12 48 · --s-16 64 · --s-24 96</div></body></html>
