<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:160px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:10px;">rhobear-mark.png · pixel-art panda/bear · always pixelated</div>
<div class="row" style="gap:24px; align-items:center;">
  <img class="pixelated" src="../assets/rhobear-mark.png" alt="" style="width:120px; height:120px;">
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div style="display:flex; align-items:center; gap:10px;">
      <img class="pixelated" src="../assets/rhobear-mark.png" alt="" style="width:32px; height:32px;">
      <span style="font-family:var(--font-display); letter-spacing:0.08em;">RHOBEAR</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
      <img class="pixelated" src="../assets/rhobear-mark.png" alt="" style="width:20px; height:20px;">
      <span class="tok">In-nav · 32px · pixelated · with wordmark</span>
    </div>
    <span class="tok" style="margin-top:6px;">image-rendering: pixelated · never AA-smoothed</span>
  </div>
</div></body></html>
