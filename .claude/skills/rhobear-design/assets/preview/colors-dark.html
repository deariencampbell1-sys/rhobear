<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Dark band</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:160px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:10px;">The “tech depth” band · install, CLI, security</div>
<div class="row">
<div class="swatch dk" style="background:#0d1220;"><span class="nm">dark-bg</span><span class="vx">#0d1220</span></div>
<div class="swatch dk" style="background:#131a2c;"><span class="nm">dark-bg-2</span><span class="vx">#131a2c</span></div>
<div class="swatch dk" style="background:#182135;"><span class="nm">dark-surface</span><span class="vx">#182135</span></div>
<div class="swatch " style="background:#e8ecf3;"><span class="nm">dark-ink</span><span class="vx">#e8ecf3</span></div>
<div class="swatch " style="background:#7dffd5;"><span class="nm">cyan</span><span class="vx">#7dffd5</span></div>
<div class="swatch " style="background:#4fd6a9;"><span class="nm">cyan-deep</span><span class="vx">#4fd6a9</span></div>
</div>
<div style="margin-top:10px;"><span class="chip-cyan" style="background:#101627;">ACTIVE WORLD</span></div></body></html>
