<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radius & shadow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:180px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:12px;">Radii · soft warm shadows</div>
<div class="row" style="gap:16px;">
  <div style="width:88px; height:64px; background:var(--c-surface); border-radius:6px; box-shadow:var(--shadow-soft); display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:var(--c-ink-3);">r-1 · 6px</div>
  <div style="width:88px; height:64px; background:var(--c-surface); border-radius:10px; box-shadow:var(--shadow-soft); display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:var(--c-ink-3);">r-2 · 10px</div>
  <div style="width:88px; height:64px; background:var(--c-surface); border-radius:14px; box-shadow:var(--shadow-card); display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:var(--c-ink-3);">r-3 · 14px</div>
  <div style="width:88px; height:64px; background:var(--c-surface); border-radius:18px; box-shadow:var(--shadow-card); display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:var(--c-ink-3);">r-4 · 18px</div>
  <div style="width:88px; height:64px; background:var(--c-surface); border-radius:22px; box-shadow:var(--shadow-lift); display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:var(--c-ink-3);">r-5 · 22px</div>
  <div style="width:130px; height:36px; background:var(--c-amber); border-radius:999px; box-shadow:var(--shadow-soft); display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:#221608;">r-pill</div>
</div>
<div class="tok" style="margin-top:12px;">shadow-soft · shadow-card · shadow-lift — warm brown-leaning drops, never gray</div></body></html>
