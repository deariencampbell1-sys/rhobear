<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chips & pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:150px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:10px;">9-pillar ribbon + quant pills</div>
<div class="row" style="gap:8px; flex-wrap:wrap;">
  <span class="chip-amber">LEAN</span><span class="chip-amber">$5 VPS</span><span class="chip-amber">COST-EFFICIENT</span><span class="chip-amber">LOCAL</span><span class="chip-amber">PRIVATE</span><span class="chip-amber">CUSTOMIZABLE</span><span class="chip-amber">EASY</span><span class="chip-amber">TRUSTWORTHY</span><span class="chip-amber">YOURS</span>
</div>
<div class="row" style="gap:10px; margin-top:14px;">
  <span class="chip-mono">30+ models</span>
  <span class="chip-mono">100+ MCPs</span>
  <span class="chip-mono">$0 markup</span>
  <span class="chip-mono">day-one usable</span>
</div></body></html>
