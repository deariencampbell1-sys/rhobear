<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hero characters (off-brand)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:240px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:10px;">4 original heroes · scout / defense / installer / brute · all per-world poses available</div>
<div class="row" style="gap:18px;">
  <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><img class="pixelated" src="../assets/hero-archer-ship.png" alt="" style="height:130px;"><span style="font-family:var(--font-display); font-size:11px; letter-spacing:0.06em;">ARCHER</span><span class="tok">scout / find / catalog</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><img class="pixelated" src="../assets/hero-armored-ship.png" alt="" style="height:130px;"><span style="font-family:var(--font-display); font-size:11px; letter-spacing:0.06em;">ARMORED</span><span class="tok">safety / hardened</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><img class="pixelated" src="../assets/hero-tinker-ship.png" alt="" style="height:130px;"><span style="font-family:var(--font-display); font-size:11px; letter-spacing:0.06em;">TINKER</span><span class="tok">install / wiring</span></div><div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><img class="pixelated" src="../assets/hero-brute-ship.png" alt="" style="height:130px;"><span style="font-family:var(--font-display); font-size:11px; letter-spacing:0.06em;">BRUTE</span><span class="tok">bulk / raw power</span></div>
</div></body></html>
