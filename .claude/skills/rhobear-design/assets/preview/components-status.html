<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Worker status badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:160px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:12px;">From the workbench · role + state</div>
<div class="row" style="gap:14px;">
  <div style="display:flex; align-items:center; gap:10px; background:#0f1530; border:1.5px solid rgba(125,255,213,0.35); border-radius:14px; padding:10px 14px; color:#e8ecf3; font-family:var(--font-mono); font-size:12px;">
    <img class="pixelated" src="../assets/guardian_ship.png" alt="" style="width:36px; height:36px;">
    <div style="display:flex; flex-direction:column;">
      <span style="font-family:var(--font-display); font-size:12px; color:var(--c-cyan);">Guardian merge gate</span>
      <span style="color:#7a8398;">2 files · +108 -15 · sonnet 4.5</span>
    </div>
  </div>
  <div style="display:flex; align-items:center; gap:10px; background:#0f1530; border:1.5px solid rgba(245,200,76,0.35); border-radius:14px; padding:10px 14px; color:#e8ecf3; font-family:var(--font-mono); font-size:12px;">
    <img class="pixelated" src="../assets/foreman_ship.png" alt="" style="width:36px; height:36px;">
    <div style="display:flex; flex-direction:column;">
      <span style="font-family:var(--font-display); font-size:12px; color:#f5c84c;">Foreman API surface</span>
      <span style="color:#7a8398;">decompose · 51m · codex</span>
    </div>
  </div>
</div></body></html>
