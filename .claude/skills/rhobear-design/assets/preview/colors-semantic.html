<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic status</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:150px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:10px;">Status + board group dots</div>
<div class="row">
<div class="swatch " style="background:#4fd6a9;"><span class="nm">ok / vetted</span><span class="vx">#4fd6a9</span></div>
<div class="swatch " style="background:#f5c84c;"><span class="nm">warn / community</span><span class="vx">#f5c84c</span></div>
<div class="swatch dk" style="background:#ef6079;"><span class="nm">error / blocked</span><span class="vx">#ef6079</span></div>
<div class="swatch " style="background:#7dffd5;"><span class="nm">info / active</span><span class="vx">#7dffd5</span></div>
<div class="swatch dk" style="background:#d472f0;"><span class="nm">tag-d (neon)</span><span class="vx">#d472f0</span></div>
<div class="swatch " style="background:#b0b8c5;"><span class="nm">tag-e (standalone)</span><span class="vx">#b0b8c5</span></div>
</div>
<div class="row" style="margin-top:12px; gap:10px;">
  <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:6px; background:rgba(79,214,169,0.18); color:#1a7a5a; font-family:var(--font-mono); font-size:11px;"><span style="width:6px; height:6px; border-radius:50%; background:#4fd6a9;"></span> Vetted</span>
  <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:6px; background:rgba(245,200,76,0.18); color:#7a5d10; font-family:var(--font-mono); font-size:11px;"><span style="width:6px; height:6px; border-radius:50%; background:#f5c84c;"></span> Community</span>
  <span style="display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:6px; background:rgba(239,96,121,0.18); color:#8a2a3a; font-family:var(--font-mono); font-size:11px;"><span style="width:6px; height:6px; border-radius:50%; background:#ef6079;"></span> Unvetted</span>
</div></body></html>
