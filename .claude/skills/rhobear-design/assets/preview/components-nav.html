<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Top nav + tab pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:160px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:12px;">Sticky shell · 60-72px · paper + blur · pixel uppercase</div>
<div style="background:rgba(246,239,225,0.85); backdrop-filter:blur(10px); border:1px solid var(--c-line); border-radius:14px; padding:12px 18px; display:flex; align-items:center; gap:18px;">
  <img class="pixelated" src="../assets/rhobear-mark.png" alt="" style="width:28px; height:28px;">
  <span style="font-family:var(--font-display); letter-spacing:0.06em; font-size:14px;">RHOBEAR</span>
  <span style="flex:1;"></span>
  <span style="font-family:var(--font-display); font-size:11px; letter-spacing:0.1em; padding:6px 12px; border-radius:999px; color:var(--c-ink-2);">HOME</span><span style="font-family:var(--font-display); font-size:11px; letter-spacing:0.1em; padding:6px 12px; border-radius:999px; color:var(--c-ink-2);">CREW</span><span style="font-family:var(--font-display); font-size:11px; letter-spacing:0.1em; padding:6px 12px; border-radius:999px; background:var(--c-amber-soft); color:var(--c-amber-deep);">HUB</span><span style="font-family:var(--font-display); font-size:11px; letter-spacing:0.1em; padding:6px 12px; border-radius:999px; color:var(--c-ink-2);">SUBSTRATE ▾</span><span style="font-family:var(--font-display); font-size:11px; letter-spacing:0.1em; padding:6px 12px; border-radius:999px; color:var(--c-ink-2);">WORLDS</span><span style="font-family:var(--font-display); font-size:11px; letter-spacing:0.1em; padding:6px 12px; border-radius:999px; color:var(--c-ink-2);">FAQ</span>
  <a class="btn-amber" href="#" style="padding:8px 14px; font-size:11px;">Spin it up →</a>
</div></body></html>
