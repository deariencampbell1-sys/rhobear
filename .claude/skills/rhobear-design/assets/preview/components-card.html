<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card · paper + stitch</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:240px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:12px;">card-paper.stitched · the signature surface</div>
<div class="card-paper stitched" style="padding:22px 24px; max-width:560px; position:relative;">
  <div class="eyebrow">ROLE · ARCHITECT</div>
  <h3 style="margin:6px 0 8px;">Plans. Verifies.</h3>
  <p style="margin:0; color:var(--c-ink-2); font-size:14px; line-height:1.6;">Decomposes a goal into lanes, gates the work against the shape you asked for, and says no when the shape is wrong.</p>
  <img class="pixelated" src="../assets/architect_ship.png" alt="" style="position:absolute; bottom:-12px; right:8px; height:120px; pointer-events:none;">
</div></body></html>
