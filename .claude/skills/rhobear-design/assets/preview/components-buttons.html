<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:130px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:10px;">CTAs · pixel-display labels, pill shape</div>
<div class="row" style="gap:14px;">
  <a href="#" class="btn-amber">Spin it up →</a>
  <a href="#" class="btn-ghost">Watch it run</a>
  <span class="chip-mono">OAuth not API keys</span>
</div>
<div class="row" style="gap:14px; margin-top:14px;">
  <span style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px; background:rgba(125,255,213,0.18); color:#0d6b54; font-family:var(--font-display); font-size:11px; letter-spacing:0.06em; text-transform:uppercase;">Promote</span>
  <span style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px; background:rgba(26,23,20,0.06); color:var(--c-ink-2); font-family:var(--font-display); font-size:11px; letter-spacing:0.06em; text-transform:uppercase;">Reject</span>
  <span style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px; background:rgba(26,23,20,0.06); color:var(--c-ink-2); font-family:var(--font-display); font-size:11px; letter-spacing:0.06em; text-transform:uppercase;">Ask Reviewer</span>
</div></body></html>
