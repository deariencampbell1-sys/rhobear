<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>World palettes</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:160px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:10px;">Three theme accents — same crew, different walls</div>
<div class="row">
  <div style="display:flex; gap:6px; align-items:center;"><div style="width:18px; height:18px; border-radius:5px; background:#0d1220;"></div><div style="width:18px; height:18px; border-radius:5px; background:#2a3a5a;"></div><div style="width:18px; height:18px; border-radius:5px; background:#7dffd5;"></div><div style="width:18px; height:18px; border-radius:5px; background:#f5c84c;"></div><span class="lbl" style="margin-left:6px;">SPACE · Starship 17-B</span></div>
</div>
<div class="row" style="margin-top:10px;">
  <div style="display:flex; gap:6px; align-items:center;"><div style="width:18px; height:18px; border-radius:5px; background:#2a1810;"></div><div style="width:18px; height:18px; border-radius:5px; background:#7a3a18;"></div><div style="width:18px; height:18px; border-radius:5px; background:#f59e2c;"></div><div style="width:18px; height:18px; border-radius:5px; background:#fde0b6;"></div><span class="lbl" style="margin-left:6px;">WEST · Frontier outpost</span></div>
</div>
<div class="row" style="margin-top:10px;">
  <div style="display:flex; gap:6px; align-items:center;"><div style="width:18px; height:18px; border-radius:5px; background:#1a0a2a;"></div><div style="width:18px; height:18px; border-radius:5px; background:#3a1a5a;"></div><div style="width:18px; height:18px; border-radius:5px; background:#7dffd5;"></div><div style="width:18px; height:18px; border-radius:5px; background:#d472f0;"></div><span class="lbl" style="margin-left:6px;">NEON · Neon Tokyo · 03:14 AM</span></div>
</div></body></html>
