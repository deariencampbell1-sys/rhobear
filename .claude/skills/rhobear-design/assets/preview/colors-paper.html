<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Paper palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:var(--c-bg); }
  body { padding: 20px 24px; min-height:170px; }
  .row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .stack { display:flex; flex-direction:column; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--c-ink-3); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--c-ink-3); }
  .tok { font-family:var(--font-mono); font-size:10.5px; color:var(--c-ink-4); letter-spacing:0.02em; }
  .swatch { width:88px; aspect-ratio:1.6; border-radius:10px; box-shadow:var(--shadow-soft); display:flex; flex-direction:column; justify-content:flex-end; padding:8px 10px; color:#1a1714; }
  .swatch.dk { color:#fff; }
  .swatch .nm { font-family:var(--font-display); font-size:10px; letter-spacing:0.06em; text-transform:uppercase; }
  .swatch .vx { font-family:var(--font-mono); font-size:9.5px; opacity:0.8; }
</style>
</head>
<body>

<div class="lbl" style="margin-bottom:10px;">Light · paper base + ink</div>
<div class="row">
<div class="swatch " style="background:#f6efe1;"><span class="nm">bg</span><span class="vx">#f6efe1</span></div>
<div class="swatch " style="background:#eee4d0;"><span class="nm">bg-2</span><span class="vx">#eee4d0</span></div>
<div class="swatch " style="background:#e3d6bd;"><span class="nm">bg-3</span><span class="vx">#e3d6bd</span></div>
<div class="swatch " style="background:#fbf6ea;"><span class="nm">surface</span><span class="vx">#fbf6ea</span></div>
<div class="swatch " style="background:#f1e7d2;"><span class="nm">surface-2</span><span class="vx">#f1e7d2</span></div>
<div class="swatch dk" style="background:#1a1714;"><span class="nm">ink</span><span class="vx">#1a1714</span></div>
<div class="swatch dk" style="background:#3a322a;"><span class="nm">ink-2</span><span class="vx">#3a322a</span></div>
<div class="swatch dk" style="background:#6b5f51;"><span class="nm">ink-3</span><span class="vx">#6b5f51</span></div>
<div class="swatch dk" style="background:#9a8b78;"><span class="nm">ink-4</span><span class="vx">#9a8b78</span></div>
</div></body></html>
