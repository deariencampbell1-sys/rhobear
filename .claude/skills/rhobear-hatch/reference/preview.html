<!DOCTYPE html>
<!-- FILE: preview.html — RHOBEAR sprite-engine preview harness (STANDALONE).
     Not part of the shipped hub. Serve the worktree root and open:
       /hub/assets/crew/_preview/preview.html
     Drives sprite-engine.js so we can dial in the FEEL before Lane H wiring. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RHOBEAR — Sprite Engine Preview</title>
  <style>
    :root {
      --bg: #0a0e14;
      --panel: #121826;
      --ink: #e6edf3;
      --muted: #8b98a9;
      --accent: #6ea8fe;
      --line: #1e2a3d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex; height: 100vh; overflow: hidden;
    }
    #stageWrap { flex: 1; position: relative; display: flex; flex-direction: column; }
    #floor {
      flex: 1; position: relative;
      background:
        radial-gradient(120% 80% at 50% 100%, #16203400 60%, #0d1422 100%),
        repeating-linear-gradient(90deg, #0e1626 0 79px, #142036 79px 80px);
    }
    /* the chatbus line crew walk along */
    #bus {
      position: absolute; left: 0; right: 0; bottom: 120px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .35;
    }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    #bubble {
      position: fixed; transform: translate(-50%, -100%);
      max-width: 240px; padding: 8px 11px; border-radius: 12px;
      background: #1b2436; color: var(--ink); border: 1px solid var(--line);
      box-shadow: 0 6px 24px #0008; font-size: 13px; display: none;
      pointer-events: none; white-space: pre-wrap; z-index: 5;
    }
    #bubble::after {
      content: ''; position: absolute; left: 50%; bottom: -7px; transform: translateX(-50%);
      border: 7px solid transparent; border-top-color: #1b2436;
    }
    #panel {
      width: 280px; background: var(--panel); border-left: 1px solid var(--line);
      padding: 16px; overflow-y: auto;
    }
    h1 { font-size: 14px; margin: 0 0 4px; letter-spacing: .5px; }
    .sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
    .group { margin-bottom: 18px; }
    .group > label { display: block; color: var(--muted); font-size: 11px;
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    select, button {
      font: inherit; color: var(--ink); background: #1a2233;
      border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px;
      cursor: pointer;
    }
    select { width: 100%; }
    button:hover { border-color: var(--accent); }
    button:active { transform: translateY(1px); }
    .btnrow { display: flex; flex-wrap: wrap; gap: 6px; }
    .btnrow button { flex: 1 1 auto; }
    .faces { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .faces button { padding: 6px 0; font-size: 11px; }
    .faces .spacer { visibility: hidden; }
    .slider { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .slider input { flex: 1; }
    .slider span { width: 46px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
    .slider label { width: 78px; font-size: 11px; color: var(--muted); }
    #status { font-size: 11px; color: var(--muted); margin-top: 4px; min-height: 14px; }
    .warn { color: #f0a868; }
  </style>
</head>
<body>
  <div id="stageWrap">
    <div id="floor">
      <div id="bus"></div>
      <canvas id="stage"></canvas>
    </div>
  </div>
  <div id="bubble"></div>

  <div id="panel">
    <h1>🐻 RHOBEAR Sprite Engine</h1>
    <div class="sub">Standalone preview · dial in the feel</div>

    <div class="group">
      <label>Crew member</label>
      <select id="crew"></select>
    </div>
    <div class="group">
      <label>World</label>
      <select id="world"></select>
      <div id="status"></div>
    </div>

    <div class="group">
      <label>Movement</label>
      <div class="btnrow">
        <button data-act="walkLeft">◀ Walk L</button>
        <button data-act="stop">■ Stop</button>
        <button data-act="walkRight">Walk R ▶</button>
      </div>
    </div>

    <div class="group">
      <label>Turn / beat</label>
      <div class="btnrow">
        <button data-act="turnLeft">↰ Turn L (W)</button>
        <button data-act="turnRight">Turn R (E) ↱</button>
      </div>
      <div class="btnrow" style="margin-top:6px">
        <button data-act="backTurn">↺ Back-turn beat (N)</button>
      </div>
    </div>

    <div class="group">
      <label>Face (all 8)</label>
      <div class="faces">
        <button data-face="north-west">NW</button>
        <button data-face="north">N</button>
        <button data-face="north-east">NE</button>
        <button data-face="west">W</button>
        <button class="spacer">·</button>
        <button data-face="east">E</button>
        <button data-face="south-west">SW</button>
        <button data-face="south">S</button>
        <button data-face="south-east">SE</button>
      </div>
    </div>

    <div class="group">
      <label>Stabilize (head-detach fix)</label>
      <div class="btnrow">
        <button data-anchor="head">🔒 Head</button>
        <button data-anchor="feet">🦶 Feet</button>
        <button data-anchor="off">⛔ Raw</button>
      </div>
      <div id="anchorState" style="font-size:11px;color:var(--muted);margin-top:4px">anchor: head</div>
    </div>

    <div class="group">
      <label>Interaction</label>
      <div class="btnrow">
        <button data-act="bubble">💬 Pop chat bubble</button>
      </div>
      <div class="btnrow" style="margin-top:6px">
        <button data-act="mouse">🖱 Mouse-react: <b id="mouseState">on</b></button>
      </div>
    </div>

    <div class="group">
      <label>Feel (live tunables)</label>
      <div class="slider"><label>walk fps</label><input id="t_walkFps" type="range" min="4" max="20" step="1"><span id="v_walkFps"></span></div>
      <div class="slider"><label>idle fps</label><input id="t_idleFps" type="range" min="2" max="14" step="1"><span id="v_idleFps"></span></div>
      <div class="slider"><label>walk speed</label><input id="t_walkSpeed" type="range" min="30" max="220" step="5"><span id="v_walkSpeed"></span></div>
      <div class="slider"><label>scale</label><input id="t_scale" type="range" min="0.4" max="2" step="0.1"><span id="v_scale"></span></div>
    </div>
  </div>

  <script src="sprite-engine.js"></script>
  <script>
    const { SpriteSheet, SpriteActor, ChatBubble, TUNE, DIRS } = window.RhobearSprites;

    // crew/world combos present on disk (from the wave5 extraction tree).
    const TREE = {
      architect: ['neon', 'ship', 'western'],
      builder:   ['neon', 'ship', 'western'],
      designer:  ['neon', 'ship', 'western'],
      foreman:   ['neon', 'ship', 'western'],
      guardian:  ['neon', 'ship', 'western'],
      lattice:   ['ship'],
      reviewer:  ['neon', 'ship', 'western'],
      spark:     ['neon', 'ship', 'western'],
      wizard:    ['neon', 'ship', 'western'],
    };

    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const bubbleEl = document.getElementById('bubble');
    const statusEl = document.getElementById('status');
    const bubble = new ChatBubble(bubbleEl);

    let actor = null;
    let mouseReact = true;
    let lastMouse = null;

    function resize() {
      const r = canvas.getBoundingClientRect();
      canvas.width = r.width; canvas.height = r.height;
    }
    window.addEventListener('resize', resize);

    function busY() { return canvas.height - 120; }

    async function loadActor(crew, world) {
      statusEl.textContent = 'loading…';
      statusEl.className = '';
      const base = `../${crew}/${world}`;
      const sheet = await new SpriteSheet(base).load();
      const present = DIRS.filter((d) => sheet.has('walking', d));
      const missing = DIRS.filter((d) => !sheet.has('walking', d));
      const keepX = actor ? actor.x : canvas.width / 2;
      sheet.computeTransforms(anchorMode);
      actor = new SpriteActor(sheet, {
        x: keepX, y: busY(), dir: 'south', scale: parseFloat(t_scale.value),
      });
      if (missing.length) {
        statusEl.className = 'warn';
        statusEl.textContent = `walk frames missing: ${missing.join(', ')}`;
      } else {
        statusEl.textContent = `${present.length}/8 walk dirs · ready`;
      }
    }

    // ---- UI wiring ----------------------------------------------------------
    const crewSel = document.getElementById('crew');
    const worldSel = document.getElementById('world');
    Object.keys(TREE).forEach((c) => {
      const o = document.createElement('option'); o.value = o.textContent = c; crewSel.appendChild(o);
    });
    function refreshWorlds() {
      worldSel.innerHTML = '';
      TREE[crewSel.value].forEach((w) => {
        const o = document.createElement('option'); o.value = o.textContent = w; worldSel.appendChild(o);
      });
    }
    crewSel.value = 'architect';
    refreshWorlds();
    worldSel.value = 'ship';
    crewSel.addEventListener('change', () => { refreshWorlds(); loadActor(crewSel.value, worldSel.value); });
    worldSel.addEventListener('change', () => loadActor(crewSel.value, worldSel.value));

    document.querySelectorAll('[data-act]').forEach((b) => {
      b.addEventListener('click', () => {
        if (!actor) return;
        const a = b.dataset.act;
        if (a === 'walkLeft') actor.walkTo(60);
        else if (a === 'walkRight') actor.walkTo(canvas.width - 60);
        else if (a === 'stop') actor.stop();
        else if (a === 'turnLeft') actor.face('west');
        else if (a === 'turnRight') actor.face('east');
        else if (a === 'backTurn') actor.backTurnBeat();
        else if (a === 'bubble') bubble.say('Tracing the call graph now — RTK store wiring looks clean, two selectors left to memoize. Standby.');
        else if (a === 'mouse') {
          mouseReact = !mouseReact;
          document.getElementById('mouseState').textContent = mouseReact ? 'on' : 'off';
          if (!mouseReact && actor) actor.setReactPoint(null);
        }
      });
    });
    document.querySelectorAll('[data-face]').forEach((b) => {
      b.addEventListener('click', () => actor && actor.face(b.dataset.face));
    });
    let anchorMode = 'head';
    document.querySelectorAll('[data-anchor]').forEach((b) => {
      b.addEventListener('click', () => {
        anchorMode = b.dataset.anchor;
        document.getElementById('anchorState').textContent = 'anchor: ' + anchorMode;
        if (actor) actor.sheet.computeTransforms(anchorMode);
      });
    });

    // live tunables
    function bindTune(id, key, fmt) {
      const inp = document.getElementById('t_' + id);
      const out = document.getElementById('v_' + id);
      const apply = () => {
        const val = parseFloat(inp.value);
        if (key) TUNE[key] = val;
        out.textContent = fmt ? fmt(val) : val;
        if (id === 'scale' && actor) actor.scale = val;
      };
      inp.addEventListener('input', apply);
      return apply;
    }
    document.getElementById('t_walkFps').value = TUNE.walkFps;
    document.getElementById('t_idleFps').value = TUNE.idleFps;
    document.getElementById('t_walkSpeed').value = TUNE.walkSpeed;
    document.getElementById('t_scale').value = 1;
    const applies = [
      bindTune('walkFps', 'walkFps'),
      bindTune('idleFps', 'idleFps'),
      bindTune('walkSpeed', 'walkSpeed'),
      bindTune('scale', null),
    ];
    applies.forEach((fn) => fn());

    // mouse-react point in canvas coords
    canvas.addEventListener('mousemove', (e) => {
      const r = canvas.getBoundingClientRect();
      lastMouse = { x: e.clientX - r.left, y: e.clientY - r.top };
    });
    canvas.addEventListener('mouseleave', () => { lastMouse = null; });

    // ---- main loop ----------------------------------------------------------
    let prev = performance.now();
    function frame(now) {
      const dt = Math.min(0.05, (now - prev) / 1000);
      prev = now;
      if (actor) {
        actor.y = busY(); // keep feet on the chatbus even after resize
        actor.setReactPoint(mouseReact ? lastMouse : null);
        actor.update(dt);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        actor.draw(ctx);
        bubble.update(dt);
        if (bubble.visible) {
          const r = canvas.getBoundingClientRect();
          bubble.positionAt(actor.bubbleAnchor(), r);
        }
      }
      requestAnimationFrame(frame);
    }

    resize();
    loadActor('architect', 'ship').then(() => requestAnimationFrame(frame));
  </script>
</body>
</html>
