<!DOCTYPE html>
<!-- FILE: hub-poc.html — RHOBEAR Hub crew-behavior POC (Lane H, Fable). STANDALONE.
     Not part of the shipped hub. Serve the worktree root and open:
       /hub/assets/crew/_preview/poc/hub-poc.html
     The room is built like HubView (world bg + canon scrim), the crew live on
     the lower-third floor band, and the stream choreography is wired to the
     canonical window 'chat:reply' event (chatbus.jsx contract). -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RHOBEAR — Hub Crew POC</title>
<style>
  :root {
    --bg: #070b14; --bg2: #0a1020;
    --glass: rgba(17,25,43,0.78); --glass2: rgba(17,25,43,0.92);
    --ink: #eaf0fb; --ink2: #c3cde0; --ink3: #94a0b8;
    --mint: #7dffd5; --mint-soft: rgba(125,255,213,0.14);
    --line: rgba(170,200,255,0.12);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); overflow: hidden;
         font: 13px/1.45 ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif; }
  #room { position: fixed; inset: 0 300px 0 0; }
  #bg { position: absolute; inset: 0; background: url('bg-ship.png') center 30% / cover no-repeat;
        image-rendering: pixelated; }
  #scrim { position: absolute; inset: 0; background:
        radial-gradient(900px 500px at 50% 110%, rgba(7,8,13,0.92), transparent 60%),
        linear-gradient(to bottom, rgba(10,13,24,0.55) 0%, rgba(10,13,24,0.30) 30%, rgba(7,8,13,0.85) 80%); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* overhead streaming bubble (canon dark glass + arrow) */
  #bubble { position: fixed; transform: translate(-50%, -100%); max-width: 280px;
    padding: 9px 12px; border-radius: 12px; background: var(--glass2); color: var(--ink);
    border: 1px solid var(--line); box-shadow: 0 6px 24px #0009; font-size: 13px;
    display: none; pointer-events: none; white-space: pre-wrap; z-index: 30; }
  #bubble::after { content: ''; position: absolute; left: 50%; bottom: -7px;
    transform: translateX(-50%); border: 7px solid transparent; border-top-color: var(--glass2); }

  /* the fake stream panel that slides in BESIDE the speaking crew */
  #streamPanel { position: absolute; top: 8%; right: -34%; width: 32%; height: 84%;
    background: var(--glass); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: 0 18px 60px #000a; transition: right .35s cubic-bezier(.2,.8,.2,1);
    z-index: 20; display: flex; flex-direction: column; overflow: hidden; }
  #streamPanel.open { right: 1.5%; }
  #streamPanel header { padding: 10px 14px; border-bottom: 1px solid var(--line);
    color: var(--mint); font-weight: 600; letter-spacing: .4px; font-size: 12px; }
  #streamBody { flex: 1; padding: 12px 14px; color: var(--ink2); font: 12px/1.6 ui-monospace, Consolas, monospace;
    overflow-y: auto; white-space: pre-wrap; }

  /* control rail */
  #rail { position: fixed; top: 0; right: 0; bottom: 0; width: 300px;
    background: linear-gradient(180deg, var(--bg2), var(--bg)); border-left: 1px solid var(--line);
    padding: 14px 16px; overflow-y: auto; z-index: 40; }
  h1 { font-size: 13px; margin: 0 0 2px; letter-spacing: .6px; }
  h1 b { color: var(--mint); }
  .sub { color: var(--ink3); font-size: 11px; margin-bottom: 14px; }
  .group { margin-bottom: 15px; }
  .group > label { display: block; color: var(--ink3); font-size: 10px;
    text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
  button, select { font: inherit; color: var(--ink); background: rgba(125,255,213,0.06);
    border: 1px solid var(--line); border-radius: 9px; padding: 7px 10px; cursor: pointer; }
  button:hover { border-color: var(--mint); background: var(--mint-soft); }
  button:active { transform: translateY(1px); }
  button.on { border-color: var(--mint); background: var(--mint-soft); color: var(--mint); }
  .btnrow { display: flex; flex-wrap: wrap; gap: 6px; }
  .btnrow button { flex: 1 1 auto; }
  .slider { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .slider label { width: 84px; font-size: 11px; color: var(--ink3); }
  .slider input { flex: 1; accent-color: var(--mint); }
  .slider span { width: 42px; text-align: right; color: var(--ink3); font-variant-numeric: tabular-nums; font-size: 11px; }
  #status { font-size: 11px; color: var(--ink3); min-height: 26px; margin-top: 6px; }
  #status b { color: var(--mint); }
  .foot { margin-top: 16px; padding-top: 10px; border-top: 1px solid var(--line);
    color: var(--ink3); font-size: 10px; letter-spacing: .4px; }
  .foot em { color: var(--mint); font-style: normal; }
</style>
</head>
<body>
  <div id="room">
    <div id="bg"></div>
    <div id="scrim"></div>
    <canvas id="stage"></canvas>
    <div id="streamPanel">
      <header>⌁ STREAM — architect</header>
      <div id="streamBody"></div>
    </div>
  </div>
  <div id="bubble"></div>

  <div id="rail">
    <h1>🐻 RHOBEAR · <b>Hub Crew POC</b></h1>
    <div class="sub">floor band · 16-phase 3D turn · personality states</div>

    <div class="group">
      <label>Chat stream (canonical 'chat:reply' wire)</label>
      <div class="btnrow">
        <button id="bStream">▶ Stream reply</button>
        <button id="bEnd">✕ End</button>
      </div>
      <div class="btnrow" style="margin-top:6px">
        <button id="bPanel">◫ Side panel (step-aside)</button>
      </div>
    </div>

    <div class="group">
      <label id="moodLabel">Crew mood</label>
      <div class="btnrow">
        <button id="mBored" class="on">Bored</button>
        <button id="mWork">Working</button>
        <button id="mCurious">Curious</button>
      </div>
    </div>

    <div class="group">
      <label>The turn (click the stage = stimulus)</label>
      <div class="btnrow">
        <button id="b360">⟳ 360° showcase</button>
      </div>
      <div class="btnrow" style="margin-top:6px">
        <button id="bL90">↺ 90°</button>
        <button id="bR90">↻ 90°</button>
        <button id="bFace">⌖ face out</button>
      </div>
      <div class="btnrow" style="margin-top:6px">
        <button id="bAB" class="on">3D: 16-phase lit ring</button>
      </div>
    </div>

    <div class="group">
      <label>Feel</label>
      <div class="slider"><label>turn ms/phase</label><input id="tTurn" type="range" min="30" max="120" step="2"><span id="vTurn"></span></div>
      <div class="slider"><label>walk speed</label><input id="tWalk" type="range" min="40" max="220" step="5"><span id="vWalk"></span></div>
      <div class="slider"><label>crew scale</label><input id="tScale" type="range" min="0.7" max="1.6" step="0.05"><span id="vScale"></span></div>
      <div class="btnrow">
        <button id="bHud" class="on">state chips</button>
        <button id="bBand">band debug</button>
      </div>
    </div>

    <div id="status">loading sets…</div>
    <div class="foot">crew perch on the world, walk the band, speak up front, rest at stations. <em>Lean. Local. Private. Yours.</em></div>
  </div>

<script src="../sprite-engine.js"></script>
<script src="sprite-engine-v2.js"></script>
<script>
const V1 = window.RhobearSprites, V2 = window.RhobearSpritesV2;
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const bubbleEl = document.getElementById('bubble');
const bubble = new V1.ChatBubble(bubbleEl);
const statusEl = document.getElementById('status');
const panelEl = document.getElementById('streamPanel');
const streamBody = document.getElementById('streamBody');

let band, architect, guardian;
let hud = true, bandDebug = false, panelOpen = false;
let streamTimer = null;

function resize() {
  // back the canvas at devicePixelRatio so pixel art stays crisp on scaled
  // Windows displays; all engine math stays in CSS px via _cssW/_cssH.
  const r = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.round(r.width * dpr);
  canvas.height = Math.round(r.height * dpr);
  canvas._cssW = r.width; canvas._cssH = r.height; canvas._dpr = dpr;
}
window.addEventListener('resize', resize);

// Which set to drive: ?crew=builder&world=western (defaults: architect/ship).
// Companion (the 8-dir snap A/B contrast) is guardian unless the hero IS
// guardian, then spark. Background expects bg-<world>.png next to this file
// (copy from rhobear-design assets); missing bg degrades to the dark gradient.
const Q = new URLSearchParams(location.search);
const CREW = Q.get('crew') || 'architect';
const WORLD = Q.get('world') || 'ship';
const COMPANION = CREW === 'guardian' ? 'spark' : 'guardian';

async function boot() {
  resize();
  const bgProbe = new Image();
  bgProbe.onload = () => { document.getElementById('bg').style.backgroundImage = `url('bg-${WORLD}.png')`; };
  bgProbe.src = `bg-${WORLD}.png`;
  document.querySelector('#streamPanel header').textContent = `⌁ STREAM — ${CREW}`;
  const archSheet = await new V1.SpriteSheet(`../../${CREW}/${WORLD}`).load();
  const guardSheet = await new V1.SpriteSheet(`../../${COMPANION}/${WORLD}`).load();
  const ring = await new V2.TurnRing(`turn16/${CREW}/${WORLD}`).load();

  band = new V2.Band(canvas, { backFrac: 0.70, frontFrac: 0.95, scaleBack: 0.66, scaleFront: 1.06, spriteScale: 1.25 });

  architect = band.add(new V2.ActorV2({
    name: CREW, sheet: archSheet, ring, band,
    station: { bx: 0.30, by: 0.42, phase: V2.phaseOfDir8('south-east') },
  }));
  architect.bubble = bubble;

  guardian = band.add(new V2.ActorV2({
    name: COMPANION, sheet: guardSheet, ring: null, band,    // snap mode: the A/B contrast
    station: { bx: 0.72, by: 0.66, phase: V2.phaseOfDir8('south-west') },
  }));

  statusEl.innerHTML = ring.ready
    ? `ready — ${CREW}/${WORLD} on the <b>16-phase lit ring</b>, ${COMPANION} on canon 8-dir snap (contrast)`
    : `<b>turn ring failed to load</b> — bake first: python bake_turn16.py --crew ${CREW} --world ${WORLD}`;
  Object.assign(window, { band, architect, guardian, bubble }); // debug/QA handles
  requestAnimationFrame(frame);
}

// ---- the canonical stream wire ------------------------------------------------
// chatbus.jsx broadcasts every reply as CustomEvent 'chat:reply' (detail = reply).
// The hub room treats it as: summon active crew, stream the text overhead.
window.addEventListener('chat:reply', (e) => {
  const reply = e.detail || {};
  if (reply.kind !== 'reply' || !reply.text) return;
  bubble.say('');                 // reset typewriter
  bubble.append(reply.text);      // full text in, typewriter paces it out
});

const DEMO_REPLY = "Tracing the mission topology now. Two lanes are converging on the same contract — I'm pinning the boundary before they collide. Holding the single source of truth steady… done. The map is clean.";

function openStream() {
  clearInterval(streamTimer);
  panelEl.classList.add('open');
  panelOpen = true;
  band.setAvoid([[0.62, 1.0]]);   // panel footprint on the band -> others step aside
  streamBody.textContent = '';
  $('bPanel').classList.add('on');
  architect.setMood('working');
  setMoodBtn('working');
  architect.summon();
  // canonical wire: one 'chat:reply' event carries the routed reply
  window.dispatchEvent(new CustomEvent('chat:reply', { detail: { kind: 'reply', ok: true, text: DEMO_REPLY } }));
  // the side panel mirrors the stream like ChatWebViewer (drip = SSE feel)
  const words = DEMO_REPLY.split(/(\s+)/);
  let i = 0;
  streamTimer = setInterval(() => {
    if (i >= words.length) { clearInterval(streamTimer); return; }
    streamBody.textContent += words[i++];
    streamBody.scrollTop = streamBody.scrollHeight;
  }, 38);
}
function endStream() {
  clearInterval(streamTimer);
  bubble.hide();
  panelEl.classList.remove('open');
  panelOpen = false;
  band.setAvoid([]);
  $('bPanel').classList.remove('on');
  architect.setMood('bored');
  setMoodBtn('bored');
  architect.dismiss();
}

// ---- controls -------------------------------------------------------------------
const $ = (id) => document.getElementById(id);
$('bStream').onclick = openStream;
$('bEnd').onclick = endStream;
$('bPanel').onclick = () => {
  panelOpen = !panelOpen;
  panelEl.classList.toggle('open', panelOpen);
  band.setAvoid(panelOpen ? [[0.62, 1.0]] : []);
  $('bPanel').classList.toggle('on', panelOpen);
};
function setMoodBtn(m) {
  ['mBored', 'mWork', 'mCurious'].forEach((id) => $(id).classList.remove('on'));
  ({ bored: 'mBored', working: 'mWork', curious: 'mCurious' })[m] &&
    $({ bored: 'mBored', working: 'mWork', curious: 'mCurious' }[m]).classList.add('on');
}
$('mBored').onclick = () => { architect.setMood('bored'); setMoodBtn('bored'); };
$('mWork').onclick = () => { architect.setMood('working'); setMoodBtn('working'); };
$('mCurious').onclick = () => { architect.setMood('curious'); architect._glyphT = .9; architect._perk = 1; setMoodBtn('curious'); };

let showTimer = null;
$('b360').onclick = () => {
  clearInterval(showTimer);
  let i = 0;
  showTimer = setInterval(() => {
    architect.turnTo(architect.phase + 1, { fast: true, overshoot: false });
    if (++i >= 16) clearInterval(showTimer);
  }, 150);
};
$('bL90').onclick = () => architect.turnTo(architect.phase - 4);
$('bR90').onclick = () => architect.turnTo(architect.phase + 4);
$('bFace').onclick = () => architect.turnTo(0);
$('bAB').onclick = () => {
  architect.use16 = !architect.use16;
  $('bAB').classList.toggle('on', architect.use16);
  $('bAB').textContent = architect.use16 ? '3D: 16-phase lit ring' : 'A/B: 8-dir snap (old)';
};
$('bHud').onclick = () => { hud = !hud; $('bHud').classList.toggle('on', hud); };
$('bBand').onclick = () => { bandDebug = !bandDebug; $('bBand').classList.toggle('on', bandDebug); };

function bindSlider(id, vid, get, set) {
  const inp = $(id), out = $(vid);
  inp.value = get();
  const apply = () => { set(parseFloat(inp.value)); out.textContent = inp.value; };
  inp.addEventListener('input', apply);
  out.textContent = inp.value;
}
bindSlider('tTurn', 'vTurn', () => V2.TUNE2.turnMsMid, (v) => {
  V2.TUNE2.turnMsMid = v; V2.TUNE2.turnMsAnticipate = v * 1.8; V2.TUNE2.turnMsSettle = v * 2.1;
});
bindSlider('tWalk', 'vWalk', () => V1.TUNE.walkSpeed, (v) => (V1.TUNE.walkSpeed = v));
bindSlider('tScale', 'vScale', () => 1, (v) => (band.spriteScale = v));

// stage click = stimulus; mouse proximity = curious wake
canvas.addEventListener('click', (e) => {
  const r = canvas.getBoundingClientRect();
  const p = band.fromCanvas(e.clientX - r.left, e.clientY - r.top);
  architect.stimulus(p.bx, p.by);
});
let lastMove = 0;
canvas.addEventListener('mousemove', (e) => {
  const now = performance.now();
  if (now - lastMove < 120) return;
  lastMove = now;
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  const a = band.toCanvas(architect.bx, architect.by);
  if (Math.hypot(x - a.x, y - a.y) < V1.TUNE.mouseReactRadius) {
    const p = band.fromCanvas(x, y);
    architect.pokeMouse(p.bx, p.by);
  }
});

// ---- main loop --------------------------------------------------------------------
let prev = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - prev) / 1000);
  prev = now;
  band.update(dt);
  const dpr = canvas._dpr || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvas._cssW || canvas.width, canvas._cssH || canvas.height);
  const cw = canvas._cssW || canvas.width, chh = canvas._cssH || canvas.height;

  if (bandDebug) {
    ctx.strokeStyle = 'rgba(125,255,213,0.35)';
    ctx.setLineDash([6, 6]);
    for (const f of [band.backFrac, band.frontFrac]) {
      ctx.beginPath(); ctx.moveTo(0, f * chh); ctx.lineTo(cw, f * chh); ctx.stroke();
    }
    ctx.setLineDash([]);
    for (const a of band.actors) {
      const s = band.toCanvas(a._home.bx, a._home.by);
      ctx.strokeStyle = 'rgba(125,255,213,0.5)';
      ctx.strokeRect(s.x - 6, s.y - 6, 12, 12);
    }
  }

  band.draw(ctx);

  if (hud) {
    ctx.font = '11px ui-monospace, Consolas, monospace';
    ctx.textAlign = 'center';
    for (const a of band.actors) {
      const pos = band.toCanvas(a.bx, a.by);
      const sc = band.scaleAt(a.by) * (band.spriteScale || 1);
      const label = `${a.name} · ${a.state}${a.state === 'rest' ? '/' + a.mood : ''}${a.use16 ? '' : ' · snap'}`;
      const y = pos.y - 236 * sc * 0.80 - 10;
      ctx.fillStyle = 'rgba(7,11,20,0.72)';
      const w = ctx.measureText(label).width + 12;
      ctx.fillRect(pos.x - w / 2, y - 11, w, 16);
      ctx.fillStyle = '#7dffd5';
      ctx.fillText(label, pos.x, y + 1);
    }
    ctx.textAlign = 'left';
  }

  bubble.update(dt);
  if (bubble.visible) {
    const r = canvas.getBoundingClientRect();
    bubble.positionAt(architect.bubbleAnchor(), r);
  }
  requestAnimationFrame(frame);
}

boot();
</script>
</body>
</html>
