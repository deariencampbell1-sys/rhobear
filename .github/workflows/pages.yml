name: Deploy RHOBEAR site to Pages

on:
  push:
    branches: [main]
    paths:
      - ".claude/skills/rhobear-design/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble the marketing site into a clean publish root
        run: |
          set -euo pipefail
          SRC=".claude/skills/rhobear-design"
          MKT="$SRC/ui_kits/marketing-site"

          rm -rf _site
          mkdir -p _site

          # Pages + stylesheet + script (exclude *.orig backups and README).
          cp "$MKT"/*.html _site/
          cp "$MKT"/shell.css _site/
          cp "$MKT"/shell.js  _site/

          # Shared design tokens + every image/font the pages reach up for.
          cp "$SRC"/colors_and_type.css _site/
          cp -r "$SRC"/assets _site/assets

          # Custom apex domain — keeps rhobear.ai bound across every redeploy.
          echo "rhobear.ai" > _site/CNAME

          # The pages live two levels deep and reference ../../assets and
          # ../../colors_and_type.css. After flattening to the publish root,
          # rewrite those up-two-levels refs to local. This makes images and
          # CSS resolve correctly at BOTH the github.io project subpath
          # (/rhobear/) AND the apex custom domain (rhobear.ai/).
          find _site -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' \) \
            -exec sed -i 's#\.\./\.\./##g' {} +

          # Sanity: index must exist and reference local assets, not ../../.
          test -f _site/index.html
          ! grep -q '\.\./\.\.' _site/index.html
          echo "Assembled $(find _site -type f | wc -l) files into _site/"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
